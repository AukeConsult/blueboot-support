<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — Blueboot Support</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<link rel="stylesheet" href="css/styles.css">
</head>
<body class="bb-login-page">
<div class="min-vh-100 d-flex align-items-center justify-content-center">
  <div class="bb-login-card">
    <div class="text-center mb-4">
      <div class="bb-brand-icon mx-auto mb-3">
        <i class="ti ti-headset" aria-hidden="true"></i>
      </div>
      <h1 class="h4 fw-semibold mb-1">Blueboot Support</h1>
      <p class="text-muted small mb-0">Sign in to manage support cases</p>
    </div>
    <div id="error-msg" class="alert alert-danger small py-2 d-none" role="alert"></div>
    <div class="mb-3">
      <label for="email" class="form-label small fw-medium">Email address</label>
      <input type="email" id="email" class="form-control" placeholder="you@blueboot.ai" autocomplete="email">
    </div>
    <div class="mb-4">
      <label for="password" class="form-label small fw-medium">Password</label>
      <input type="password" id="password" class="form-control" autocomplete="current-password">
    </div>
    <button id="login-btn" class="btn bb-btn-primary w-100">
      <i class="ti ti-login me-1" aria-hidden="true"></i> Sign in
    </button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script>
firebase.initializeApp(window.FIREBASE_CONFIG);

const auth  = firebase.auth();
const email = document.getElementById("email");
const pass  = document.getElementById("password");
const btn   = document.getElementById("login-btn");
const err   = document.getElementById("error-msg");

function showErr(msg) {
  err.textContent = msg;
  err.classList.remove("d-none");
}

auth.onAuthStateChanged(user => {
  if (user) window.location.href = "index.html";
});

btn.addEventListener("click", async () => {
  err.classList.add("d-none");
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span> Signing in…';
  try {
    await auth.signInWithEmailAndPassword(email.value.trim(), pass.value);
    window.location.href = "index.html";
  } catch (e) {
    showErr(e.message || "Sign-in failed");
    btn.disabled = false;
    btn.innerHTML = '<i class="ti ti-login me-1"></i> Sign in';
  }
});

[email, pass].forEach(el => el.addEventListener("keydown", e => {
  if (e.key === "Enter") btn.click();
}));
</script>
</body>
</html>
