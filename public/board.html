<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cases — Blueboot Support</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<link rel="stylesheet" href="css/styles.css">
</head>
<body class="bb-app">

<!-- Navbar -->
<nav class="navbar navbar-expand-lg bb-navbar">
  <div class="container-fluid px-4">
    <a class="navbar-brand bb-brand" href="board.html" id="brand-link">
      <i class="ti ti-headset me-2" aria-hidden="true"></i><span id="brand-label">Cases</span>
    </a>
    <div class="bb-global-search flex-grow-1 mx-3 d-none d-md-block">
      <div class="position-relative">
        <i class="ti ti-search bb-global-search-icon" aria-hidden="true"></i>
        <input type="search" id="global-search-input" class="form-control form-control-sm bb-global-search-input"
               placeholder="Search all channels…" autocomplete="off">
        <div id="global-search-results" class="bb-global-search-results d-none"></div>
      </div>
    </div>
    <div class="ms-auto d-flex align-items-center gap-3">
      <span class="small" style="color:rgba(255,255,255,0.4)">
        <span class="bb-refresh-dot" id="refresh-dot" title="Auto-refreshes every 2 min"></span>
      </span>
      <span id="user-email" class="small" style="color:rgba(255,255,255,0.6)"></span>
      <a id="channels-admin-link" href="channels_admin.html" class="btn btn-sm bb-btn-outline-light d-none">
        <i class="ti ti-settings me-1" aria-hidden="true"></i>Channels
      </a>
      <button id="check-btn" class="btn btn-sm bb-btn-outline-light">
        <i class="ti ti-refresh me-1" aria-hidden="true"></i>Check mail
      </button>
      <button id="logout-btn" class="btn btn-sm btn-link p-0" style="color:rgba(255,255,255,0.5)">Sign out</button>
    </div>
  </div>
</nav>

<!-- Channel nav -->
<div id="channel-nav" class="bb-channel-nav"></div>

<main class="container-fluid px-4 py-4">

  <!-- Stats row -->
  <div class="row g-3 mb-4">
    <div class="col-6 col-md-3">
      <div class="bb-stat-card bb-stat-card-new">
        <div class="bb-stat-header">
          <div class="bb-stat-icon bb-stat-icon-new"><i class="ti ti-inbox"></i></div>
          <span class="bb-stat-label">New</span>
        </div>
        <div class="bb-stat-value text-primary" id="stat-new">—</div>
        <div class="bb-stat-sub">awaiting reply</div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="bb-stat-card bb-stat-card-followup">
        <div class="bb-stat-header">
          <div class="bb-stat-icon bb-stat-icon-followup"><i class="ti ti-clock"></i></div>
          <span class="bb-stat-label">Follow Up</span>
        </div>
        <div class="bb-stat-value text-warning" id="stat-followup">—</div>
        <div class="bb-stat-sub">in progress</div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="bb-stat-card bb-stat-card-resolved">
        <div class="bb-stat-header">
          <div class="bb-stat-icon bb-stat-icon-resolved"><i class="ti ti-circle-check"></i></div>
          <span class="bb-stat-label">Resolved</span>
        </div>
        <div class="bb-stat-value text-success" id="stat-resolved">—</div>
        <div class="bb-stat-sub">completed</div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="bb-stat-card bb-stat-card-overdue">
        <div class="bb-stat-header">
          <div class="bb-stat-icon bb-stat-icon-overdue"><i class="ti ti-alert-triangle"></i></div>
          <span class="bb-stat-label">Overdue</span>
        </div>
        <div class="bb-stat-value text-danger" id="stat-overdue">—</div>
        <div class="bb-stat-sub">past SLA</div>
      </div>
    </div>
  </div>

  <!-- Filters -->
  <div class="card bb-filter-card mb-3">
    <div class="card-body py-2 px-3">
      <div class="row g-2 align-items-center">
        <div class="col-12 col-md-4">
          <input type="search" id="search-input" class="form-control form-control-sm"
                 placeholder="Search subject or email…">
        </div>
        <div class="col-6 col-md-2">
          <select id="filter-status" class="form-select form-select-sm">
            <option value="">All statuses</option>
            <option value="new">New</option>
            <option value="follow_up">Follow Up</option>
            <option value="not_interested">Not Interested</option>
            <option value="resolved">Resolved</option>
            <option value="closed">Closed</option>
          </select>
        </div>
        <div class="col-6 col-md-2">
          <select id="filter-priority" class="form-select form-select-sm">
            <option value="">All priorities</option>
            <option value="high">High</option>
            <option value="normal">Normal</option>
            <option value="low">Low</option>
          </select>
        </div>
        <div class="col-6 col-md-2 d-flex align-items-center">
          <div class="form-check form-switch mb-0">
            <input class="form-check-input" type="checkbox" id="filter-mine">
            <label class="form-check-label small" for="filter-mine">My cases</label>
          </div>
        </div>
        <div class="col-6 col-md-2 text-md-end">
          <span id="case-count" class="small text-muted"></span>
        </div>
      </div>
      <div class="row g-2 align-items-center mt-1 pt-2 bb-filter-row2">
        <div class="col-6 col-md-2">
          <input type="text" id="filter-tags" class="form-control form-control-sm" placeholder="Tag…">
        </div>
        <div class="col-6 col-md-4 d-flex gap-1">
          <select id="saved-filter-select" class="form-select form-select-sm">
            <option value="">Saved filters…</option>
          </select>
          <button id="save-filter-btn" class="btn btn-sm bb-btn-outline" title="Save current filter">
            <i class="ti ti-bookmark-plus"></i>
          </button>
          <button id="delete-filter-btn" class="btn btn-sm bb-btn-outline" title="Delete selected saved filter">
            <i class="ti ti-trash"></i>
          </button>
        </div>
        <div class="col-12 col-md-6 d-flex justify-content-md-end gap-2">
          <button id="export-btn" class="btn btn-sm bb-btn-outline">
            <i class="ti ti-download me-1"></i>Export CSV
          </button>
          <div class="bb-pager">
            <button id="prev-page-btn" class="btn btn-sm bb-btn-outline" disabled title="Previous page">
              <i class="ti ti-chevron-left"></i>
            </button>
            <button id="next-page-btn" class="btn btn-sm bb-btn-outline" disabled title="Next page">
              <i class="ti ti-chevron-right"></i>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Feedback bar -->
  <div id="feedback" class="alert py-2 px-3 small mb-3 d-none" role="status"></div>

  <!-- Bulk action toolbar (shown when 1+ rows selected) -->
  <div id="bulk-toolbar" class="card bb-bulk-toolbar mb-3 d-none">
    <div class="card-body py-2 px-3 d-flex align-items-center gap-2 flex-wrap">
      <span class="small fw-semibold" id="bulk-count">0 selected</span>
      <select id="bulk-status" class="form-select form-select-sm" style="max-width:150px">
        <option value="">Set status…</option>
        <option value="new">New</option>
        <option value="follow_up">Follow Up</option>
        <option value="not_interested">Not Interested</option>
        <option value="resolved">Resolved</option>
        <option value="closed">Closed</option>
      </select>
      <select id="bulk-priority" class="form-select form-select-sm" style="max-width:130px">
        <option value="">Set priority…</option>
        <option value="high">High</option>
        <option value="normal">Normal</option>
        <option value="low">Low</option>
      </select>
      <select id="bulk-assignee" class="form-select form-select-sm" style="max-width:170px">
        <option value="">Assign to…</option>
      </select>
      <button id="bulk-apply-btn" class="btn btn-sm bb-btn-primary">Apply</button>
      <button id="bulk-clear-btn" class="btn btn-sm btn-link text-muted">Clear</button>
    </div>
  </div>

  <!-- Cases table -->
  <div class="card bb-table-card">
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table bb-table mb-0">
          <thead class="bb-thead">
            <tr>
              <th style="width:34px"><input type="checkbox" class="form-check-input" id="select-all-checkbox" title="Select all on this page"></th>
              <th style="width:150px">Case</th>
              <th style="width:260px;min-width:160px">Subject</th>
              <th style="width:180px;min-width:140px">From</th>
              <th style="width:120px">Status</th>
              <th style="width:80px">Priority</th>
              <th style="width:130px">Last activity</th>
              <th style="width:280px">Actions</th>
            </tr>
          </thead>
          <tbody id="cases-tbody">
            <tr><td colspan="8" class="text-center text-muted py-5">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</main>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/channels.js"></script>
<script>
const API = window.SUPPORT_API;

firebase.initializeApp(window.FIREBASE_CONFIG);
const auth = firebase.auth();

let _cases       = [];
let _channels    = [];
let _refreshTimer = null;
let _selected     = new Set();   // case ids selected for bulk action, current page only
let _savedFilters = [];
let _cursorStack  = [];          // stack of previous-page cursors, for Prev
let _currentCursor = null;       // cursor of the page currently shown (null = first page)
let _nextCursor   = null;        // cursor for the next page, or null if this is the last page
const _PAGE_LIMIT = 100;

// Resolved once channels load: which mailbox this page shows, its label,
// whether it's the main (Support) channel, and the main channel's
// account/label (the transfer destination for every non-main channel).
let ACCOUNT       = new URLSearchParams(window.location.search).get("account") || "";
let BOARD_LABEL   = "Cases";
let IS_MAIN       = false;
let MAIN_ACCOUNT  = "";
let MAIN_LABEL    = "Support";
let CURRENT_USER_EMAIL = "";
let _teamMembers  = [];

async function getToken() {
  return auth.currentUser ? auth.currentUser.getIdToken() : null;
}

async function fetchJSON(path, opts = {}) {
  const token = await getToken();
  const res = await fetch(API + path, {
    ...opts,
    headers: {
      "Authorization": `Bearer ${token}`,
      "Content-Type":  "application/json",
      ...(opts.headers || {}),
    },
  });
  if (!res.ok) throw new Error((await res.json().catch(() => ({}))).error || `HTTP ${res.status}`);
  return res.json();
}

function setFeedback(msg, type) {
  const fb = document.getElementById("feedback");
  if (!type) { fb.classList.add("d-none"); return; }
  fb.className = `alert alert-${type} py-2 px-3 small mb-3`;
  fb.innerHTML = msg;
  fb.classList.remove("d-none");
}

function escHtml(s) {
  return (s || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function statusBadge(s) {
  const map = {
    new:            ["new",            "New"],
    follow_up:      ["follow_up",      "Follow Up"],
    not_interested: ["not_interested", "Not Interested"],
    resolved:       ["resolved",       "Resolved"],
    closed:         ["closed",         "Closed"],
    open:           ["new",            "New"],       // legacy
    replied:        ["follow_up",      "Follow Up"], // legacy
  };
  const [cls, label] = map[s] || ["secondary", s || "—"];
  return `<span class="badge bb-badge-${cls}">${label}</span>`;
}

function priorityBadge(p) {
  const map = { high: "danger", normal: "secondary", low: "info" };
  return `<span class="badge bb-badge-${map[p] || "secondary"}">${p || "normal"}</span>`;
}

function relTime(iso) {
  if (!iso) return "—";
  const d = Math.floor((Date.now() - new Date(iso)) / 1000);
  if (d < 60)     return "just now";
  if (d < 3600)   return `${Math.floor(d / 60)}m ago`;
  if (d < 86400)  return `${Math.floor(d / 3600)}h ago`;
  return `${Math.floor(d / 86400)}d ago`;
}

function isOverdue(c) {
  if (!c.sla_deadline) return false;
  const active = ["new", "open", "follow_up"];
  return active.includes(c.status) && new Date(c.sla_deadline) < new Date();
}

function isUnread(c) {
  // Unread = last message was from customer (IN) and case is active
  const active = ["new", "open", "follow_up"];
  return active.includes(c.status) && c.last_history_direction === "IN";
}

function rowStatusClass(s) {
  const norm = (s === "open" || s === "replied") ? (s === "replied" ? "follow_up" : "new") : s;
  return `bb-row-${norm}`;
}

async function transferCase(docId, caseNum) {
  if (!MAIN_ACCOUNT) return;
  if (!confirm(`Transfer ${BOARD_LABEL} Case ${caseNum} to ${MAIN_LABEL}? A linked copy (with full history) will be created there; this case stays here too, marked as transferred.`)) return;
  try {
    const r = await fetchJSON(`/api/support/cases/${docId}/transfer`, {
      method: "POST",
      body: JSON.stringify({ to_account: MAIN_ACCOUNT }),
    });
    setFeedback(`<i class="ti ti-check me-1"></i>Transferred to ${MAIN_LABEL} as ${MAIN_LABEL} Case ${r.new_board_no || r.new_case_id}.`, "success");
    await refresh();
    setTimeout(() => setFeedback(null), 4000);
  } catch (e) {
    setFeedback(`<i class="ti ti-circle-x me-1"></i>${escHtml(e.message)}`, "danger");
  }
}

function quickActions(c) {
  const transferBtn = (!IS_MAIN && MAIN_ACCOUNT)
    ? `<button class="bb-quick-btn transfer" onclick="transferCase('${c.id}','${c.board_no || c.case_id}')">
         <i class="ti ti-arrow-right" style="font-size:.7rem"></i> To ${escHtml(MAIN_LABEL)}
       </button>`
    : "";

  if (c.transferred_to) {
    const toLabel = window.BBChannels.labelFor(c.transferred_to.account) || MAIN_LABEL;
    return `
      <div class="bb-quick-actions">
        <span class="bb-quick-btn transferred" title="Moved to the ${escHtml(toLabel)} board">
          <i class="ti ti-arrow-right" style="font-size:.7rem"></i> Transferred (${escHtml(toLabel)} Case ${c.transferred_to.board_no || c.transferred_to.case_id})
        </span>
      </div>`;
  }

  const inactive = ["not_interested", "resolved", "closed"];
  if (c.transferred_from) {
    const reopenBtn = inactive.includes(c.status)
      ? `<button class="bb-quick-btn reopen" onclick="quickStatus('${c.id}','new')"><i class="ti ti-refresh" style="font-size:.7rem"></i> Re-open</button>`
      : `<button class="bb-quick-btn reply" onclick="quickReply('${c.id}')"><i class="ti ti-send" style="font-size:.7rem"></i> Reply</button>
         <button class="bb-quick-btn fu" onclick="quickStatus('${c.id}','follow_up')">Follow Up</button>
         <button class="bb-quick-btn ni" onclick="quickStatus('${c.id}','not_interested')">Not Interested</button>`;
    return `<div class="bb-quick-actions">${reopenBtn}${assignControl(c)}</div>`;
  }

  if (inactive.includes(c.status)) {
    return `
      <div class="bb-quick-actions">
        <button class="bb-quick-btn reopen" onclick="quickStatus('${c.id}','new')">
          <i class="ti ti-refresh" style="font-size:.7rem"></i> Re-open
        </button>
        ${transferBtn}
        ${assignControl(c)}
      </div>`;
  }
  return `
    <div class="bb-quick-actions">
      <button class="bb-quick-btn reply" onclick="quickReply('${c.id}')">
        <i class="ti ti-send" style="font-size:.7rem"></i> Reply
      </button>
      <button class="bb-quick-btn fu" onclick="quickStatus('${c.id}','follow_up')">
        Follow Up
      </button>
      <button class="bb-quick-btn ni" onclick="quickStatus('${c.id}','not_interested')">
        Not Interested
      </button>
      ${transferBtn}
      ${assignControl(c)}
    </div>`;
}

function renderCases(cases) {
  const tbody = document.getElementById("cases-tbody");
  const newCount = cases.filter(c => c.status === "new" || c.status === "open").length;
  document.title = newCount > 0 ? `(${newCount} new) ${BOARD_LABEL} Cases — Blueboot Support` : `${BOARD_LABEL} Cases — Blueboot Support`;
  document.getElementById("case-count").textContent =
    `${cases.length} case${cases.length !== 1 ? "s" : ""}`;

  if (!cases.length) {
    tbody.innerHTML = `<tr><td colspan="8" class="text-center text-muted py-5">No cases found</td></tr>`;
    return;
  }

  tbody.innerHTML = cases.map(c => {
    const overdue = isOverdue(c);
    const unread  = isUnread(c);
    const fromLabel = c.transferred_from ? window.BBChannels.labelFor(c.transferred_from.account) : "";
    return `
    <tr class="bb-row ${rowStatusClass(c.status)}" onclick="window.location='case_detail.html?id=${encodeURIComponent(c.id)}'"
        style="cursor:pointer">
      <td onclick="event.stopPropagation()">
        <input type="checkbox" class="bb-row-select form-check-input" data-id="${c.id}"
               ${_selected.has(c.id) ? "checked" : ""}
               onchange="toggleRowSelect('${c.id}', this.checked)">
      </td>
      <td>
        <span class="bb-case-id">${BOARD_LABEL} Case ${c.board_no || c.case_id || c.id}</span>
        ${overdue ? '<span class="bb-overdue-chip">Overdue</span>' : ""}
        ${c.transferred_from ? `<span class="bb-overdue-chip" style="background:#ede9fe;color:#6d28d9" title="Transferred from ${escHtml(fromLabel)}">From ${escHtml(fromLabel)}</span>` : ""}
        ${c.assigned_to ? `<span class="bb-overdue-chip bb-assigned-chip" title="Assigned to ${escHtml(c.assigned_to)}">${escHtml(c.assigned_to.split("@")[0])}</span>` : ""}
      </td>
      <td class="bb-subject">
        ${unread ? '<span class="bb-unread-dot" title="Customer reply waiting"></span>' : ""}${escHtml(c.subject || "(no subject)")}
      </td>
      <td style="width:180px;min-width:140px">
        ${escHtml(c.from_name || c.from_email || "—")}<br>
        <small class="text-muted">${escHtml(c.from_email || "")}</small>
      </td>
      <td>${statusBadge(c.status)}</td>
      <td>${priorityBadge(c.priority)}</td>
      <td class="small text-muted">${relTime(c.last_history_at || c.updated_at)}</td>
      <td onclick="event.stopPropagation()">${quickActions(c)}</td>
    </tr>`;
  }).join("");
}

// Filter changes always restart at page 1 — a cursor from the old filter
// set wouldn't make sense against a newly-filtered query.
function applyFilters() {
  _cursorStack   = [];
  _currentCursor = null;
  loadTablePage(null);
}

function buildFilterParams() {
  const params = new URLSearchParams();
  if (ACCOUNT) params.set("account", ACCOUNT);
  const st = document.getElementById("filter-status").value;
  const pr = document.getElementById("filter-priority").value;
  const tg = document.getElementById("filter-tags").value.trim();
  const q  = document.getElementById("search-input").value.trim();
  if (st) params.set("status", st);
  if (pr) params.set("priority", pr);
  if (tg) params.set("tags", tg);
  if (q)  params.set("q", q);
  return params;
}

function renderStats(cases) {
  const now = new Date();
  const active = ["new", "open", "follow_up"];
  let s = { new: 0, follow_up: 0, resolved: 0, overdue: 0 };
  cases.forEach(c => {
    const st = c.status;
    if (st === "new" || st === "open") s.new++;
    else if (st === "follow_up") s.follow_up++;
    else if (st === "resolved" || st === "closed" || st === "replied") s.resolved++;
    if (c.sla_deadline && active.includes(st) && new Date(c.sla_deadline) < now) s.overdue++;
  });
  document.getElementById("stat-new").textContent      = s.new;
  document.getElementById("stat-followup").textContent = s.follow_up;
  document.getElementById("stat-resolved").textContent = s.resolved;
  document.getElementById("stat-overdue").textContent  = s.overdue;
}

// Stats cards always reflect the whole channel regardless of the table's
// current filter/page — fetched separately from the (filtered, paginated)
// table data so changing a filter never makes the dashboard counts lie.
async function loadStats() {
  try {
    const data = await fetchJSON(`/api/support/cases?limit=200&account=${encodeURIComponent(ACCOUNT)}`);
    renderStats(data.cases || []);
  } catch (e) {
    // Non-fatal — stat cards just keep their last known values.
  }
}

// "My cases" has no backend filter (assigned_to isn't indexed for it), so
// when it's on we fetch one larger unpaginated batch and filter client side;
// the Prev/Next pager is disabled in that mode. Otherwise every filter is
// applied server-side and paged via cursor.
async function loadTablePage(cursor) {
  try {
    const params = buildFilterParams();
    const mine = document.getElementById("filter-mine").checked;
    if (mine) {
      params.set("limit", "200");
      const data = await fetchJSON(`/api/support/cases?${params.toString()}`);
      _cases = (data.cases || []).filter(c => c.assigned_to === CURRENT_USER_EMAIL);
      _nextCursor = null;
    } else {
      params.set("limit", String(_PAGE_LIMIT));
      if (cursor) params.set("cursor", cursor);
      const data = await fetchJSON(`/api/support/cases?${params.toString()}`);
      _cases = data.cases || [];
      _nextCursor = data.next_cursor || null;
    }
    _selected.clear();
    renderCases(_cases);
    updateBulkToolbar();
    updatePagerButtons();
  } catch (e) {
    document.getElementById("cases-tbody").innerHTML =
      `<tr><td colspan="8" class="text-center text-danger py-4">${escHtml(e.message)}</td></tr>`;
  }
}

function updatePagerButtons() {
  document.getElementById("prev-page-btn").disabled = _cursorStack.length === 0;
  document.getElementById("next-page-btn").disabled = !_nextCursor;
}

async function goNextPage() {
  if (!_nextCursor) return;
  _cursorStack.push(_currentCursor);
  _currentCursor = _nextCursor;
  await loadTablePage(_currentCursor);
}

async function goPrevPage() {
  if (!_cursorStack.length) return;
  _currentCursor = _cursorStack.pop();
  await loadTablePage(_currentCursor);
}

async function exportCsv() {
  const btn = document.getElementById("export-btn");
  btn.disabled = true;
  const original = btn.innerHTML;
  btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>Exporting…';
  try {
    const params = buildFilterParams();
    const token  = await getToken();
    const res = await fetch(`${API}/api/support/cases/export?${params.toString()}`, {
      headers: { "Authorization": `Bearer ${token}` },
    });
    if (!res.ok) throw new Error((await res.json().catch(() => ({}))).error || `HTTP ${res.status}`);
    const blob = await res.blob();
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement("a");
    a.href = url;
    a.download = "support_cases_export.csv";
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  } catch (e) {
    setFeedback(`<i class="ti ti-circle-x me-1"></i>${escHtml(e.message)}`, "danger");
  } finally {
    btn.disabled = false;
    btn.innerHTML = original;
  }
}

// ── Bulk selection + bulk actions ───────────────────────────────────────────

function toggleRowSelect(id, checked) {
  if (checked) _selected.add(id); else _selected.delete(id);
  updateBulkToolbar();
  syncSelectAllCheckbox();
}

function toggleSelectAll(checked) {
  document.querySelectorAll(".bb-row-select").forEach(cb => {
    cb.checked = checked;
    if (checked) _selected.add(cb.dataset.id); else _selected.delete(cb.dataset.id);
  });
  updateBulkToolbar();
}

function syncSelectAllCheckbox() {
  const all = document.querySelectorAll(".bb-row-select");
  document.getElementById("select-all-checkbox").checked =
    all.length > 0 && Array.from(all).every(cb => cb.checked);
}

function clearSelection() {
  _selected.clear();
  document.querySelectorAll(".bb-row-select").forEach(cb => cb.checked = false);
  document.getElementById("select-all-checkbox").checked = false;
  updateBulkToolbar();
}

function updateBulkToolbar() {
  const toolbar = document.getElementById("bulk-toolbar");
  const count = _selected.size;
  document.getElementById("bulk-count").textContent = `${count} selected`;
  toolbar.classList.toggle("d-none", count === 0);
}

function renderBulkAssigneeOptions() {
  const sel = document.getElementById("bulk-assignee");
  sel.innerHTML = `<option value="">Assign to…</option>` +
    _teamMembers.map(u => `<option value="${escHtml(u.email)}">${escHtml(u.email)}</option>`).join("");
}

async function applyBulkAction() {
  const ids = Array.from(_selected);
  if (!ids.length) return;
  const update = {};
  const st  = document.getElementById("bulk-status").value;
  const pr  = document.getElementById("bulk-priority").value;
  const asg = document.getElementById("bulk-assignee").value;
  if (st)  update.status = st;
  if (pr)  update.priority = pr;
  if (asg) update.assigned_to = asg;
  if (!Object.keys(update).length) {
    setFeedback(`<i class="ti ti-alert-triangle me-1"></i>Choose at least one change to apply.`, "danger");
    return;
  }

  const btn = document.getElementById("bulk-apply-btn");
  btn.disabled = true;
  try {
    const r = await fetchJSON("/api/support/cases/bulk-update", {
      method: "POST",
      body: JSON.stringify({ case_ids: ids, update }),
    });
    setFeedback(
      `<i class="ti ti-check me-1"></i>Updated ${r.succeeded} case${r.succeeded !== 1 ? "s" : ""}` +
      (r.failed ? `, ${r.failed} failed` : "") + ".",
      r.failed ? "warning" : "success"
    );
    document.getElementById("bulk-status").value   = "";
    document.getElementById("bulk-priority").value = "";
    document.getElementById("bulk-assignee").value = "";
    clearSelection();
    await Promise.all([loadStats(), loadTablePage(_currentCursor)]);
    setTimeout(() => setFeedback(null), 3500);
  } catch (e) {
    setFeedback(`<i class="ti ti-circle-x me-1"></i>${escHtml(e.message)}`, "danger");
  } finally {
    btn.disabled = false;
  }
}

// ── Saved filters ────────────────────────────────────────────

async function loadSavedFilters() {
  try {
    const data = await fetchJSON("/api/support/saved-filters");
    _savedFilters = data.filters || [];
  } catch (e) {
    _savedFilters = [];
  }
  renderSavedFilterOptions();
}

function renderSavedFilterOptions() {
  const sel = document.getElementById("saved-filter-select");
  sel.innerHTML = `<option value="">Saved filters…</option>` +
    _savedFilters.map((f, i) => `<option value="${i}">${escHtml(f.name)}</option>`).join("");
}

function applySavedFilter(idx) {
  const f = _savedFilters[idx];
  if (!f) return;
  document.getElementById("filter-status").value   = f.status   || "";
  document.getElementById("filter-priority").value = f.priority || "";
  document.getElementById("filter-tags").value     = f.tags     || "";
  document.getElementById("filter-mine").checked   = !!f.mine;
  applyFilters();
}

async function saveCurrentFilter() {
  const name = prompt("Name this filter:");
  if (!name || !name.trim()) return;
  const entry = {
    name:     name.trim(),
    status:   document.getElementById("filter-status").value,
    priority: document.getElementById("filter-priority").value,
    tags:     document.getElementById("filter-tags").value.trim(),
    mine:     document.getElementById("filter-mine").checked,
  };
  const next = [..._savedFilters, entry];
  try {
    const data = await fetchJSON("/api/support/saved-filters", {
      method: "PUT",
      body: JSON.stringify({ filters: next }),
    });
    _savedFilters = data.filters || next;
    renderSavedFilterOptions();
    setFeedback(`<i class="ti ti-check me-1"></i>Saved filter "${escHtml(entry.name)}"`, "success");
    setTimeout(() => setFeedback(null), 2000);
  } catch (e) {
    setFeedback(`<i class="ti ti-circle-x me-1"></i>${escHtml(e.message)}`, "danger");
  }
}

async function deleteSelectedSavedFilter() {
  const sel = document.getElementById("saved-filter-select");
  const idx = parseInt(sel.value, 10);
  if (isNaN(idx)) return;
  const next = _savedFilters.filter((_, i) => i !== idx);
  try {
    const data = await fetchJSON("/api/support/saved-filters", {
      method: "PUT",
      body: JSON.stringify({ filters: next }),
    });
    _savedFilters = data.filters || next;
    renderSavedFilterOptions();
  } catch (e) {
    setFeedback(`<i class="ti ti-circle-x me-1"></i>${escHtml(e.message)}`, "danger");
  }
}

async function refresh() {
  _cursorStack   = [];
  _currentCursor = null;
  await Promise.all([loadStats(), loadTablePage(null)]);
}

function startAutoRefresh() {
  if (_refreshTimer) clearInterval(_refreshTimer);
  _refreshTimer = setInterval(refresh, 2 * 60 * 1000);
}

async function checkMail() {
  const btn = document.getElementById("check-btn");
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>Checking_…';
  setFeedback('<i class="ti ti-refresh me-1"></i>Checking mail_…', "info");
  try {
    const r = await fetchJSON("/api/support/check-mail", { method: "POST" });
    setFeedback(
      `<i class="ti ti-check me-1"></i>Done — ${r.new_cases} new case${r.new_cases !== 1 ? "s" : ""}, ` +
      `${r.appended} message${r.appended !== 1 ? "s" : ""} appended.`,
      "success"
    );
    await refresh();
  } catch (e) {
    setFeedback(`<i class="ti ti-circle-x me-1"></i>${escHtml(e.message)}`, "danger");
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<i class="ti ti-refresh me-1"></i>Check mail';
  }
}

async function quickStatus(caseId, status) {
  try {
    const token = await getToken();
    await fetch(API + `/api/support/cases/${caseId}`, {
      method: "PATCH",
      headers: { "Authorization": `Bearer ${token}`, "Content-Type": "application/json" },
      body: JSON.stringify({ status }),
    });
    setFeedback(`<i class="ti ti-check me-1"></i>Status updated to <b>${status.replace(/_/g," ")}</b>`, "success");
    await refresh();
    setTimeout(() => setFeedback(null), 2500);
  } catch (e) {
    setFeedback(`<i class="ti ti-circle-x me-1"></i>${escHtml(e.message)}`, "danger");
  }
}

function quickReply(caseId) {
  window.location.href = `case_detail.html?id=${encodeURIComponent(caseId)}&reply=1`;
}

// ── Assign to a teammate ─────────────────────────────

async function loadTeamMembers() {
  try {
    const data = await fetchJSON("/api/support/users");
    _teamMembers = data.users || [];
  } catch (e) {
    _teamMembers = [];
  }
  renderBulkAssigneeOptions();
}

async function assignCase(caseId, email) {
  try {
    const token = await getToken();
    await fetch(API + `/api/support/cases/${caseId}`, {
      method: "PATCH",
      headers: { "Authorization": `Bearer ${token}`, "Content-Type": "application/json" },
      body: JSON.stringify({ assigned_to: email || null }),
    });
    setFeedback(`<i class="ti ti-check me-1"></i>${email ? "Assigned to " + escHtml(email) : "Unassigned"}`, "success");
    await refresh();
    setTimeout(() => setFeedback(null), 2500);
  } catch (e) {
    setFeedback(`<i class="ti ti-circle-x me-1"></i>${escHtml(e.message)}`, "danger");
  }
}

function assignControl(c) {
  const mine = !!c.assigned_to && c.assigned_to === CURRENT_USER_EMAIL;
  const mineBtn = `
    <button class="bb-quick-btn assign ${mine ? "active" : ""}"
            title="${mine ? "Click to unassign from you" : "Assign this case to yourself"}"
            onclick="assignCase('${c.id}', '${mine ? "" : CURRENT_USER_EMAIL}')">
      <i class="ti ti-user-circle" style="font-size:.7rem"></i> ${mine ? "Mine" : "Assign to me"}
    </button>`;
  const others = _teamMembers.filter(u => u.email !== CURRENT_USER_EMAIL);
  if (!others.length) return mineBtn;
  const placeholder = (c.assigned_to && !mine) ? escHtml(c.assigned_to.split("@")[0]) : "Assign_…";
  const dropdown = `
    <select class="bb-quick-assign-select" title="Assign to a teammate"
            onchange="if(this.value) assignCase('${c.id}', this.value); this.selectedIndex=0;">
      <option value="">${placeholder}</option>
      ${others.map(u => `<option value="${escHtml(u.email)}">${escHtml(u.email)}</option>`).join("")}
    </select>`;
  return mineBtn + dropdown;
}

// ── Cross-channel search (point 6) ────────────────────────

let _searchDebounce = null;

function hideGlobalSearchResults() {
  const el = document.getElementById("global-search-results");
  el.classList.add("d-none");
  el.innerHTML = "";
}

async function runGlobalSearch(q) {
  const resultsEl = document.getElementById("global-search-results");
  if (!q) { hideGlobalSearchResults(); return; }
  try {
    const data  = await fetchJSON(`/api/support/cases?q=${encodeURIComponent(q)}&limit=20`);
    const cases = data.cases || [];
    if (!cases.length) {
      resultsEl.innerHTML = `<div class="bb-global-search-empty">No matches</div>`;
    } else {
      resultsEl.innerHTML = cases.map(c => {
        const label = window.BBChannels.labelFor(c.mail_account);
        return `<a href="case_detail.html?id=${encodeURIComponent(c.id)}" class="bb-global-search-item">
          <span class="bb-global-search-channel">${escHtml(label)}</span>
          <span class="bb-global-search-subject">${escHtml(c.subject || "(no subject)")}</span>
          <span class="bb-global-search-from text-muted">${escHtml(c.from_email || "")}</span>
        </a>`;
      }).join("");
    }
    resultsEl.classList.remove("d-none");
  } catch (e) {
    resultsEl.innerHTML = `<div class="bb-global-search-empty text-danger">${escHtml(e.message)}</div>`;
    resultsEl.classList.remove("d-none");
  }
}

// ── Admin-only "Channels" link (point 4) ────────────────────────

async function checkAdminLink() {
  try {
    const me = await fetchJSON("/api/support/me");
    if (me.role === "admin") {
      document.getElementById("channels-admin-link").classList.remove("d-none");
    }
  } catch (e) {
  }
}

async function initChannel() {
  _channels = await window.BBChannels.fetchChannels(fetchJSON);
  const main = window.BBChannels.mainChannel(_channels);
  MAIN_ACCOUNT = main ? main.account : "";
  MAIN_LABEL   = main ? main.label   : "Support";

  if (!ACCOUNT && main) {
    ACCOUNT = main.account;
  }
  if (ACCOUNT) {
    const url = new URL(window.location.href);
    url.searchParams.set("account", ACCOUNT);
    history.replaceState(null, "", url);
  }

  const current = _channels.find(c => c.account === ACCOUNT);
  BOARD_LABEL = current ? current.label : (ACCOUNT.split("@")[0] || "Cases");
  IS_MAIN     = current ? current.is_main : false;

  document.getElementById("brand-label").textContent = BOARD_LABEL;
  window.BBChannels.render("channel-nav", _channels, ACCOUNT);
}

auth.onAuthStateChanged(async user => {
  if (!user) { window.location.href = "login.html"; return; }
  CURRENT_USER_EMAIL = user.email || "";
  document.getElementById("user-email").textContent = user.email;
  try {
    await initChannel();
  } catch (e) {
    setFeedback(`<i class="ti ti-circle-x me-1"></i>Could not load channels: ${escHtml(e.message)}`, "danger");
  }
  checkAdminLink();
  await loadTeamMembers();
  await loadSavedFilters();
  await refresh();
  startAutoRefresh();
});

document.getElementById("logout-btn").onclick  = () => auth.signOut().then(() => { window.location.href = "login.html"; });
document.getElementById("check-btn").onclick   = checkMail;
document.getElementById("search-input").addEventListener("input",  applyFilters);
document.getElementById("filter-status").addEventListener("change", applyFilters);
document.getElementById("filter-priority").addEventListener("change", applyFilters);
document.getElementById("filter-mine").addEventListener("change", applyFilters);

let _tagsDebounce = null;
document.getElementById("filter-tags").addEventListener("input", () => {
  clearTimeout(_tagsDebounce);
  _tagsDebounce = setTimeout(applyFilters, 400);
});

document.getElementById("saved-filter-select").addEventListener("change", (e) => {
  if (e.target.value !== "") applySavedFilter(parseInt(e.target.value, 10));
});
document.getElementById("save-filter-btn").onclick   = saveCurrentFilter;
document.getElementById("delete-filter-btn").onclick = deleteSelectedSavedFilter;
document.getElementById("export-btn").onclick        = exportCsv;
document.getElementById("prev-page-btn").onclick      = goPrevPage;
document.getElementById("next-page-btn").onclick      = goNextPage;
document.getElementById("select-all-checkbox").addEventListener("change", (e) => toggleSelectAll(e.target.checked));
document.getElementById("bulk-apply-btn").onclick = applyBulkAction;
document.getElementById("bulk-clear-btn").onclick = clearSelection;

const _globalSearchInput = document.getElementById("global-search-input");
_globalSearchInput.addEventListener("input", () => {
  clearTimeout(_searchDebounce);
  const q = _globalSearchInput.value.trim();
  _searchDebounce = setTimeout(() => runGlobalSearch(q), 300);
});
_globalSearchInput.addEventListener("focus", () => {
  if (_globalSearchInput.value.trim()) runGlobalSearch(_globalSearchInput.value.trim());
});
document.addEventListener("click", (e) => {
  if (!e.target.closest(".bb-global-search")) hideGlobalSearchResults();
});
</script>
