<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cases — Blueboot Support</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<link rel="stylesheet" href="css/styles.css">
</head>
<body class="bb-app">

<!-- Navbar -->
<nav class="navbar navbar-expand-lg bb-navbar">
  <div class="container-fluid px-4">
    <a class="navbar-brand bb-brand" href="index.html">
      <i class="ti ti-headset me-2" aria-hidden="true"></i>Support
    </a>
    <div class="ms-auto d-flex align-items-center gap-3">
      <span id="user-email" class="small text-muted"></span>
      <button id="check-btn" class="btn btn-sm bb-btn-outline">
        <i class="ti ti-refresh me-1" aria-hidden="true"></i>Check mail
      </button>
      <button id="logout-btn" class="btn btn-sm btn-link text-muted p-0">Sign out</button>
    </div>
  </div>
</nav>

<main class="container-fluid px-4 py-4">

  <!-- Stats row -->
  <div class="row g-3 mb-4" id="stats-row">
    <div class="col-6 col-md-3">
      <div class="bb-stat-card">
        <div class="bb-stat-label">Open</div>
        <div class="bb-stat-value text-danger" id="stat-open">—</div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="bb-stat-card">
        <div class="bb-stat-label">In Progress</div>
        <div class="bb-stat-value text-warning" id="stat-inprogress">—</div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="bb-stat-card">
        <div class="bb-stat-label">Resolved</div>
        <div class="bb-stat-value text-success" id="stat-resolved">—</div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="bb-stat-card">
        <div class="bb-stat-label">Total</div>
        <div class="bb-stat-value" id="stat-total">—</div>
      </div>
    </div>
  </div>

  <!-- Filters -->
  <div class="card bb-filter-card mb-3">
    <div class="card-body py-2 px-3">
      <div class="row g-2 align-items-center">
        <div class="col-12 col-md-4">
          <input type="search" id="search-input" class="form-control form-control-sm" placeholder="Search subject or email…">
        </div>
        <div class="col-6 col-md-3">
          <select id="filter-status" class="form-select form-select-sm">
            <option value="">All statuses</option>
            <option value="open">Open</option>
            <option value="in_progress">In Progress</option>
            <option value="resolved">Resolved</option>
            <option value="closed">Closed</option>
          </select>
        </div>
        <div class="col-6 col-md-3">
          <select id="filter-account" class="form-select form-select-sm">
            <option value="">All accounts</option>
          </select>
        </div>
        <div class="col-12 col-md-2 text-md-end">
          <span id="case-count" class="small text-muted"></span>
        </div>
      </div>
    </div>
  </div>

  <!-- Feedback bar -->
  <div id="feedback" class="alert py-2 px-3 small mb-3 d-none" role="status"></div>

  <!-- Cases table -->
  <div class="card bb-table-card">
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table bb-table mb-0">
          <thead class="bb-thead">
            <tr>
              <th style="width:90px">Case</th>
              <th>Subject</th>
              <th style="width:200px">From</th>
              <th style="width:110px">Status</th>
              <th style="width:130px">Last activity</th>
              <th style="width:150px">Mail account</th>
            </tr>
          </thead>
          <tbody id="cases-tbody">
            <tr><td colspan="6" class="text-center text-muted py-5">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</main>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script>
const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyXXXXXXXXXXXXXXXXXX",
  authDomain:        "blueboot-market.firebaseapp.com",
  projectId:         "blueboot-market",
  storageBucket:     "blueboot-market.appspot.com",
  messagingSenderId: "XXXXXXXXXXXX",
  appId:             "1:XXXXXXXXXXXX:web:XXXXXXXXXXXX",
};
const API = "https://us-central1-blueboot-market.cloudfunctions.net/supportApi";

firebase.initializeApp(FIREBASE_CONFIG);
const auth = firebase.auth();

let _token = null;
let _cases = [];

async function getToken() {
  const user = auth.currentUser;
  if (!user) return null;
  _token = await user.getIdToken();
  return _token;
}

async function fetchJSON(path, opts = {}) {
  const token = await getToken();
  const res = await fetch(API + path, {
    ...opts,
    headers: { "Authorization": `Bearer ${token}`, "Content-Type": "application/json", ...(opts.headers || {}) },
  });
  if (!res.ok) throw new Error((await res.json().catch(() => ({}))).error || `HTTP ${res.status}`);
  return res.json();
}

function setFeedback(msg, type) {
  const fb = document.getElementById("feedback");
  if (!type) { fb.classList.add("d-none"); return; }
  fb.className = `alert alert-${type} py-2 px-3 small mb-3`;
  fb.innerHTML = msg;
  fb.classList.remove("d-none");
}

function statusBadge(s) {
  const map = {
    open: ["danger", "Open"],
    in_progress: ["warning", "In Progress"],
    resolved: ["success", "Resolved"],
    closed: ["secondary", "Closed"],
  };
  const [cls, label] = map[s] || ["secondary", s];
  return `<span class="badge bb-badge-${cls}">${label}</span>`;
}

function relTime(iso) {
  if (!iso) return "—";
  const d = Math.floor((Date.now() - new Date(iso)) / 1000);
  if (d < 60) return "just now";
  if (d < 3600) return `${Math.floor(d/60)}m ago`;
  if (d < 86400) return `${Math.floor(d/3600)}h ago`;
  return `${Math.floor(d/86400)}d ago`;
}

function renderCases(cases) {
  const tbody = document.getElementById("cases-tbody");
  document.getElementById("case-count").textContent = `${cases.length} case${cases.length !== 1 ? "s" : ""}`;
  if (!cases.length) {
    tbody.innerHTML = `<tr><td colspan="6" class="text-center text-muted py-5">No cases found</td></tr>`;
    return;
  }
  tbody.innerHTML = cases.map(c => `
    <tr class="bb-row" onclick="window.location='case_detail.html?id=${c.id}'" style="cursor:pointer">
      <td><span class="bb-case-id">Case ${c.case_id || c.id}</span></td>
      <td class="bb-subject">${escHtml(c.subject || "(no subject)")}</td>
      <td class="text-truncate" style="max-width:200px" title="${escHtml(c.from_email || "")}">${escHtml(c.from_name || c.from_email || "—")}<br><small class="text-muted">${escHtml(c.from_email || "")}</small></td>
      <td>${statusBadge(c.status)}</td>
      <td class="small text-muted">${relTime(c.last_message_at || c.updated_at)}</td>
      <td class="small text-muted text-truncate" style="max-width:150px">${escHtml(c.mail_account || "—")}</td>
    </tr>
  `).join("");
}

function escHtml(s) {
  return (s || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function applyFilters() {
  const q  = document.getElementById("search-input").value.trim().toLowerCase();
  const st = document.getElementById("filter-status").value;
  const ac = document.getElementById("filter-account").value;
  renderCases(_cases.filter(c =>
    (!st || c.status === st) &&
    (!ac || c.mail_account === ac) &&
    (!q  || (c.subject || "").toLowerCase().includes(q) || (c.from_email || "").toLowerCase().includes(q))
  ));
}

async function loadStats() {
  try {
    const s = await fetchJSON("/api/support/stats");
    document.getElementById("stat-open").textContent      = s.open        ?? 0;
    document.getElementById("stat-inprogress").textContent = s.in_progress ?? 0;
    document.getElementById("stat-resolved").textContent  = s.resolved     ?? 0;
    document.getElementById("stat-total").textContent     = s.total        ?? 0;
  } catch (e) { /* non-fatal */ }
}

async function loadCases() {
  try {
    const data = await fetchJSON("/api/support/cases?limit=200");
    _cases = data.cases || [];

    // Populate account filter
    const accounts = [...new Set(_cases.map(c => c.mail_account).filter(Boolean))];
    const acSel = document.getElementById("filter-account");
    accounts.forEach(a => {
      const opt = document.createElement("option");
      opt.value = a; opt.textContent = a;
      acSel.appendChild(opt);
    });

    applyFilters();
  } catch (e) {
    document.getElementById("cases-tbody").innerHTML =
      `<tr><td colspan="6" class="text-center text-danger py-4">${escHtml(e.message)}</td></tr>`;
  }
}

async function checkMail() {
  const btn = document.getElementById("check-btn");
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>Checking…';
  setFeedback('<i class="ti ti-refresh me-1"></i>Checking mail…', "info");
  try {
    const r = await fetchJSON("/api/support/check-mail", { method: "POST" });
    setFeedback(`<i class="ti ti-check me-1"></i>Done — ${r.new_cases} new cases, ${r.appended} appended.`, "success");
    await loadCases();
    await loadStats();
  } catch (e) {
    setFeedback(`<i class="ti ti-circle-x me-1"></i>${escHtml(e.message)}`, "danger");
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<i class="ti ti-refresh me-1"></i>Check mail';
  }
}

auth.onAuthStateChanged(async user => {
  if (!user) { window.location.href = "login.html"; return; }
  document.getElementById("user-email").textContent = user.email;
  await Promise.all([loadStats(), loadCases()]);
});

document.getElementById("logout-btn").onclick = () => auth.signOut().then(() => window.location.href = "login.html");
document.getElementById("check-btn").onclick  = checkMail;
document.getElementById("search-input").addEventListener("input", applyFilters);
document.getElementById("filter-status").addEventListener("change", applyFilters);
document.getElementById("filter-account").addEventListener("change", applyFilters);
</script>
</body>
</html>
