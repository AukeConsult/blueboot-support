<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Case Detail — Blueboot Support</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<link rel="stylesheet" href="css/styles.css">
</head>
<body class="bb-app">

<nav class="navbar bb-navbar">
  <div class="container-fluid px-4">
    <a class="navbar-brand bb-brand" href="index.html">
      <i class="ti ti-arrow-left me-2" aria-hidden="true"></i>All cases
    </a>
    <div class="ms-auto d-flex align-items-center gap-2">
      <span id="user-email" class="small text-muted"></span>
      <button id="logout-btn" class="btn btn-sm btn-link text-muted p-0">Sign out</button>
    </div>
  </div>
</nav>

<main class="container py-4" style="max-width:860px">

  <!-- Case header -->
  <div class="card bb-case-header-card mb-4">
    <div class="card-body">
      <div class="d-flex justify-content-between align-items-start gap-3 flex-wrap">
        <div>
          <div class="bb-case-number mb-1" id="case-number">Case —</div>
          <h1 class="h5 fw-semibold mb-1" id="case-subject">Loading…</h1>
          <p class="small text-muted mb-0">
            <i class="ti ti-user me-1" aria-hidden="true"></i><span id="case-from">—</span>
            &nbsp;·&nbsp;
            <i class="ti ti-clock me-1" aria-hidden="true"></i><span id="case-created">—</span>
            &nbsp;·&nbsp;
            <i class="ti ti-inbox me-1" aria-hidden="true"></i><span id="case-account">—</span>
            &nbsp;·&nbsp;SLA:&nbsp;<span id="case-sla" class="fw-medium">—</span>
          </p>
        </div>
        <div class="d-flex gap-2 align-items-center flex-wrap">
          <select id="priority-select" class="form-select form-select-sm bb-status-select" title="Priority">
            <option value="high">🔴 High</option>
            <option value="normal" selected>🟡 Normal</option>
            <option value="low">🔵 Low</option>
          </select>
          <select id="status-select" class="form-select form-select-sm bb-status-select">
            <option value="new">New</option>
            <option value="follow_up">Follow Up</option>
            <option value="not_interested">Not Interested</option>
            <option value="resolved">Resolved</option>
            <option value="closed">Closed</option>
          </select>
          <button id="save-meta-btn" class="btn btn-sm bb-btn-outline">Save</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Feedback -->
  <div id="feedback" class="alert py-2 px-3 small mb-3 d-none" role="status"></div>

  <!-- Unified timeline -->
  <div id="timeline" class="bb-thread mb-4"></div>

  <!-- Action tabs: Reply / Note -->
  <div class="card bb-reply-card">
    <div class="card-header bg-transparent border-0 pb-0 pt-3 px-3">
      <ul class="nav nav-tabs bb-composer-tabs" role="tablist">
        <li class="nav-item" role="presentation">
          <button class="nav-link active" id="tab-reply" data-bs-toggle="tab"
                  data-bs-target="#pane-reply" type="button" role="tab">
            <i class="ti ti-send me-1" aria-hidden="true"></i>Reply
          </button>
        </li>
        <li class="nav-item" role="presentation">
          <button class="nav-link" id="tab-note" data-bs-toggle="tab"
                  data-bs-target="#pane-note" type="button" role="tab">
            <i class="ti ti-note me-1" aria-hidden="true"></i>Internal note
          </button>
        </li>
      </ul>
    </div>
    <div class="card-body pt-2">
      <div class="tab-content">
        <!-- Reply pane -->
        <div class="tab-pane fade show active" id="pane-reply" role="tabpanel">
          <textarea id="reply-body" class="form-control bb-reply-textarea mb-3"
                    rows="5" placeholder="Type your reply…"></textarea>
          <div class="d-flex justify-content-end">
            <button id="send-btn" class="btn bb-btn-primary">
              <i class="ti ti-send me-1" aria-hidden="true"></i>Send reply
            </button>
          </div>
        </div>
        <!-- Note pane -->
        <div class="tab-pane fade" id="pane-note" role="tabpanel">
          <textarea id="note-body" class="form-control bb-reply-textarea mb-3"
                    rows="4" placeholder="Internal note — not sent to the customer…"></textarea>
          <div class="d-flex justify-content-end">
            <button id="note-btn" class="btn bb-btn-outline">
              <i class="ti ti-note me-1" aria-hidden="true"></i>Add note
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

</main>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<!-- Bootstrap JS for tabs -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/firebase-config.js"></script>
<script>
const API    = window.SUPPORT_API;
const caseId = new URLSearchParams(location.search).get("id");
if (!caseId) window.location.href = "index.html";

firebase.initializeApp(window.FIREBASE_CONFIG);
const auth = firebase.auth();

async function getToken() { return auth.currentUser ? auth.currentUser.getIdToken() : null; }
async function fetchJSON(path, opts = {}) {
  const t   = await getToken();
  const res = await fetch(API + path, {
    ...opts,
    headers: {
      "Authorization": `Bearer ${t}`,
      "Content-Type":  "application/json",
      ...(opts.headers || {}),
    },
  });
  if (!res.ok) throw new Error((await res.json().catch(() => ({}))).error || `HTTP ${res.status}`);
  return res.json();
}

function setFeedback(msg, type) {
  const fb = document.getElementById("feedback");
  if (!type) { fb.classList.add("d-none"); return; }
  fb.className = `alert alert-${type} py-2 px-3 small mb-3`;
  fb.innerHTML = msg;
  fb.classList.remove("d-none");
}

function escHtml(s) {
  return (s || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

function formatDate(iso) {
  if (!iso) return "—";
  try { return new Date(iso).toLocaleString(undefined, { dateStyle: "medium", timeStyle: "short" }); }
  catch (_) { return iso; }
}

function slaStatus(iso) {
  if (!iso) return "—";
  const diff = new Date(iso) - Date.now();
  const h    = Math.floor(Math.abs(diff) / 3600000);
  const past = diff < 0;
  const label = past ? `Overdue by ${h}h` : `${h}h remaining`;
  const cls   = past ? "text-danger fw-semibold" : (h < 4 ? "text-warning fw-medium" : "text-success");
  return `<span class="${cls}">${label}</span>`;
}

// ── Unified timeline renderer ────────────────────────────────────────────────
function renderTimeline(items) {
  const el = document.getElementById("timeline");
  if (!items || !items.length) {
    el.innerHTML = `<p class="text-muted small text-center py-3">No activity yet.</p>`;
    return;
  }

  el.innerHTML = items.map(item => {
    if (item.timeline_type === "action") {
      return renderAction(item);
    }
    return renderMessage(item);
  }).join("");
}

function renderMessage(m) {
  const type  = m.type || "";
  const isIn  = type === "EMAIL_IN";
  const isOut = type === "EMAIL_OUT";
  const isNote = type === "NOTE";

  if (isNote) {
    return `
      <div class="bb-note-event">
        <i class="ti ti-note me-1" aria-hidden="true"></i>
        <span class="bb-note-by">${escHtml(m.sent_by || "agent")}</span> added a note
        <span class="bb-event-time ms-2">${formatDate(m.timestamp)}</span>
        <div class="bb-note-body mt-1">${escHtml(m.body || "").replace(/\n/g, "<br>")}</div>
      </div>`;
  }

  const cls    = isIn ? "bb-msg-in" : "bb-msg-out";
  const sender = isIn ? "Customer" : (m.is_auto_reply ? "Auto-reply" : (m.sent_by || "Agent"));
  const autoBadge = m.is_auto_reply ? '<span class="bb-auto-badge ms-2">Auto</span>' : "";

  return `
    <div class="bb-msg ${cls}">
      <div class="bb-msg-header">
        <span class="bb-msg-sender">${escHtml(sender)}${autoBadge}</span>
        <span class="bb-msg-from">${escHtml(m.from_email || "")}</span>
        <span class="bb-msg-time">${formatDate(m.timestamp)}</span>
      </div>
      <div class="bb-msg-body">${escHtml(m.body || "(no body)").replace(/\n/g, "<br>")}</div>
    </div>`;
}

function renderAction(a) {
  const icons = {
    status_changed:  "ti-arrows-exchange",
    assigned:        "ti-user-check",
    priority_changed:"ti-flag",
    tags_updated:    "ti-tag",
    replied:         "ti-send",
    note_added:      "ti-note",
    auto_replied:    "ti-mail-forward",
    email_received:  "ti-mail-down",
    created:         "ti-plus-circle",
  };
  const icon  = icons[a.type] || "ti-point";
  const label = {
    status_changed:   `Status changed: <b>${escHtml(a.from_value)}</b> → <b>${escHtml(a.to_value)}</b>`,
    assigned:         `Assigned to <b>${escHtml(a.to_value || "nobody")}</b>`,
    priority_changed: `Priority changed to <b>${escHtml(a.to_value)}</b>`,
    tags_updated:     `Tags updated`,
    replied:          `Reply sent to <b>${escHtml(a.to_value)}</b>`,
    note_added:       `Internal note added`,
    auto_replied:     `Auto-reply sent`,
    email_received:   `Email received from <b>${escHtml(a.by)}</b>`,
    created:          `Case created${a.note ? " — " + escHtml(a.note) : ""}`,
  }[a.type] || escHtml(a.type);

  return `
    <div class="bb-action-event">
      <i class="ti ${icon} me-1" aria-hidden="true"></i>
      <span>${label}</span>
      <span class="bb-event-by ms-1 text-muted">by ${escHtml(a.by || "system")}</span>
      <span class="bb-event-time ms-2">${formatDate(a.at)}</span>
    </div>`;
}

// ── Load case ────────────────────────────────────────────────────────────────
async function loadCase() {
  try {
    const data = await fetchJSON(`/api/support/cases/${caseId}`);
    document.title = `Case ${data.case_id || caseId} — Blueboot Support`;
    document.getElementById("case-number").textContent  = `Case ${data.case_id || caseId}`;
    document.getElementById("case-subject").textContent = data.subject || "(no subject)";
    document.getElementById("case-from").textContent    = data.from_name
      ? `${data.from_name} <${data.from_email}>` : (data.from_email || "—");
    document.getElementById("case-created").textContent = formatDate(data.created_at);
    document.getElementById("case-account").textContent = data.mail_account || "—";
    document.getElementById("case-sla").innerHTML       = slaStatus(data.sla_deadline);
    document.getElementById("status-select").value      = data.status || "open";
    document.getElementById("priority-select").value    = data.priority || "normal";
    renderTimeline(data.timeline || []);
  } catch (e) {
    setFeedback(`<i class="ti ti-circle-x me-1"></i>${escHtml(e.message)}`, "danger");
  }
}

// ── Save meta (status + priority) ─────────────────────────────────────────
async function saveMeta() {
  const btn = document.getElementById("save-meta-btn");
  btn.disabled = true;
  try {
    await fetchJSON(`/api/support/cases/${caseId}`, {
      method: "PATCH",
      body: JSON.stringify({
        status:   document.getElementById("status-select").value,
        priority: document.getElementById("priority-select").value,
      }),
    });
    setFeedback('<i class="ti ti-check me-1"></i>Saved', "success");
    setTimeout(() => setFeedback(null), 2000);
    await loadCase();
  } catch (e) {
    setFeedback(`<i class="ti ti-circle-x me-1"></i>${escHtml(e.message)}`, "danger");
  } finally {
    btn.disabled = false;
  }
}

// ── Send reply ────────────────────────────────────────────────────────────
async function sendReply() {
  const body = document.getElementById("reply-body").value.trim();
  if (!body) { setFeedback("Reply body cannot be empty.", "warning"); return; }
  const btn = document.getElementById("send-btn");
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>Sending…';
  try {
    await fetchJSON(`/api/support/cases/${caseId}/reply`, {
      method: "POST",
      body: JSON.stringify({ body }),
    });
    document.getElementById("reply-body").value = "";
    setFeedback('<i class="ti ti-check me-1"></i>Reply sent', "success");
    await loadCase();
    setTimeout(() => setFeedback(null), 3000);
  } catch (e) {
    setFeedback(`<i class="ti ti-circle-x me-1"></i>${escHtml(e.message)}`, "danger");
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<i class="ti ti-send me-1"></i>Send reply';
  }
}

// ── Add note ──────────────────────────────────────────────────────────────
async function addNote() {
  const text = document.getElementById("note-body").value.trim();
  if (!text) { setFeedback("Note cannot be empty.", "warning"); return; }
  const btn = document.getElementById("note-btn");
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>Saving…';
  try {
    await fetchJSON(`/api/support/cases/${caseId}/note`, {
      method: "POST",
      body: JSON.stringify({ text }),
    });
    document.getElementById("note-body").value = "";
    setFeedback('<i class="ti ti-check me-1"></i>Note added', "success");
    await loadCase();
    setTimeout(() => setFeedback(null), 3000);
  } catch (e) {
    setFeedback(`<i class="ti ti-circle-x me-1"></i>${escHtml(e.message)}`, "danger");
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<i class="ti ti-note me-1"></i>Add note';
  }
}
  document.getElementById("reply-body").value = body;
  document.getElementById("reply-body").focus();
}

auth.onAuthStateChanged(async user => {
  if (!user) { window.location.href = "login.html"; return; }
  document.getElementById("user-email").textContent = user.email;
  await loadCase();
  // Auto-open reply tab if redirected from board quick reply button
  if (new URLSearchParams(location.search).get("reply") === "1") {
    const tab = document.getElementById("tab-reply");
    if (tab) new bootstrap.Tab(tab).show();
    document.getElementById("reply-body").focus();
  }
});

document.getElementById("logout-btn").onclick    = () => auth.signOut().then(() => { window.location.href = "login.html"; });
document.getElementById("send-btn").onclick      = sendReply;
document.getElementById("note-btn").onclick      = addNote;
document.getElementById("save-meta-btn").onclick = saveMeta;
</script>
</body>
</html>
