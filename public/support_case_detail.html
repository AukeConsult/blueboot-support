<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redirecting… — Blueboot Support</title>
</head>
<body>
<!--
  This page now lives at case_detail.html?id=<caseId> — case_detail.html is
  the single canonical detail page for every channel (it resolves the case's
  channel label and transfer target dynamically). This stub exists only so
  old bookmarks and links to support_case_detail.html keep working.
-->
<script>
const id = new URLSearchParams(location.search).get("id") || "";
window.location.replace("case_detail.html" + (id ? "?id=" + encodeURIComponent(id) : ""));
</script>
<p>Redirecting…</p>
</body>
</html>
